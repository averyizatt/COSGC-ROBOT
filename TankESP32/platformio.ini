; PlatformIO Project Configuration File
;
; ESP32-S3 Rover Control System
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
board_revision = 1.0
framework = arduino

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -DDISABLE_BROWNOUT_DETECTOR
    ; Uncomment to enable sensor debug output
    ; -DDEBUG_SENSORS
    ; Uncomment to enable Xbox controller debug output
    ; -DDEBUG_XBOX
    ; Uncomment to enable autonomous navigation debug output
    ; -DDEBUG_AUTONOMOUS

; Upload settings
upload_speed = 115200
upload_protocol = esptool
upload_resetmethod = ck

; Flash settings for 8MB board
board_upload.flash_mode = dio
board_upload.flash_freq = 80m
board_upload.flash_size = 8MB

; Dependencies
lib_deps = 
    Wire@^1.0
    adafruit/Adafruit NeoPixel@^1.11.0

; Use custom Arduino ESP32 framework with Bluepad32 BLE gamepad support
platform_packages =
    framework-arduinoespressif32 @ https://github.com/ricardoquesada/esp32-arduino-lib-builder/releases/download/4.1.0/esp32-bluepad32-4.1.0.zip

; Custom include directories
build_src_filter = 
    +<*>
    +<../include/*>
